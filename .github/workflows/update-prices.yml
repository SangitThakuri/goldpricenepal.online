name: Update Gold Prices

on:
  schedule:
    - cron: '0 */4 * * *'   # every 4 hours
  workflow_dispatch:          # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch and persist FENEGOSIDA prices
        run: |
          HTML=$(curl -s "https://fenegosida.org/" \
            -H "User-Agent: Mozilla/5.0 (compatible; GoldPriceNepal/1.0)" \
            --max-time 20 || echo "")

          GOLD=$(echo "$HTML" | python3 -c "
          import sys, re
          html = sys.stdin.read()
          m = re.search(r'FINE GOLD[\s\S]{0,120}per 1 tola[\s\S]{0,80}<b>(\d+)</b>', html)
          print(m.group(1) if m else '0')
          ")

          SILVER=$(echo "$HTML" | python3 -c "
          import sys, re
          html = sys.stdin.read()
          m = re.search(r'SILVER[\s\S]{0,120}per 1 tola[\s\S]{0,80}<b>(\d+)</b>', html)
          print(m.group(1) if m else '0')
          ")

          DATE=$(date -u +"%Y-%m-%d")
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          if [ "$GOLD" = "0" ] || [ -z "$GOLD" ]; then
            echo "FENEGOSIDA fetch failed — keeping existing data unchanged"
            exit 0
          fi

          echo "Fetched: gold=$GOLD, silver=$SILVER, date=$DATE"

          # --- Update prices.json (today's live price) ---
          echo "{\"gold24kTola\": $GOLD, \"silverTola\": $SILVER, \"updatedAt\": \"$TIMESTAMP\"}" \
            > data/prices.json

          # --- Append/update history.json ---
          python3 - << PYEOF
          import json, os

          gold   = $GOLD
          silver = $SILVER
          date   = "$DATE"
          path   = "data/history.json"

          try:
              with open(path) as f:
                  history = json.load(f)
          except Exception:
              history = []

          # Replace today's entry if already present (keep freshest values)
          history = [h for h in history if h.get("date") != date]
          history.append({"date": date, "gold24k": gold, "silver": silver})

          # Sort oldest → newest, keep at most 730 days (2 years)
          history.sort(key=lambda x: x["date"])
          history = history[-730:]

          with open(path, "w") as f:
              json.dump(history, f, separators=(",", ":"))

          print(f"history.json: {len(history)} records, latest={history[-1]}")
          PYEOF

      - name: Commit updated prices
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add data/prices.json data/history.json
          git diff --staged --quiet \
            && echo "No changes to commit" \
            || git commit -m "chore: update gold prices $(date -u +%Y-%m-%d)"
          git push
