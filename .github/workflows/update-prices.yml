name: Update Gold Prices

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch and persist FENEGOSIDA prices
        run: |
          HTML=$(curl -s "https://fenegosida.org/" \
            -H "User-Agent: Mozilla/5.0 (compatible; GoldPriceNepal/1.0)" \
            --max-time 20 || echo "")

          GOLD=$(echo "$HTML" | python3 -c "
          import sys, re
          html = sys.stdin.read()
          m = re.search(r'FINE GOLD[\s\S]{0,120}per 1 tola[\s\S]{0,80}<b>(\d+)</b>', html)
          print(m.group(1) if m else '0')
          ")

          SILVER=$(echo "$HTML" | python3 -c "
          import sys, re
          html = sys.stdin.read()
          m = re.search(r'SILVER[\s\S]{0,120}per 1 tola[\s\S]{0,80}<b>(\d+)</b>', html)
          print(m.group(1) if m else '0')
          ")

          if [ "$GOLD" = "0" ] || [ -z "$GOLD" ]; then
            echo "FENEGOSIDA fetch failed — keeping existing data unchanged"
            exit 0
          fi

          echo "Fetched: gold=$GOLD, silver=$SILVER"
          GOLD=$GOLD \
          SILVER=$SILVER \
          DATE=$(date -u +"%Y-%m-%d") \
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ") \
          python3 .github/scripts/update_prices.py

      - name: Fetch exchange rates server-side
        run: |
          curl -s \
            "https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json" \
            -H "User-Agent: Mozilla/5.0 (compatible; GoldPriceNepal/1.0)" \
            --max-time 30 \
            -o /tmp/rates_raw.json || echo "{}" > /tmp/rates_raw.json
          python3 .github/scripts/update_rates.py

      - name: Commit updated data
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add data/prices.json data/history.json data/rates.json
          git diff --staged --quiet \
            && echo "No changes to commit" \
            || git commit -m "chore: update gold prices $(date -u +%Y-%m-%d)"
          git push
