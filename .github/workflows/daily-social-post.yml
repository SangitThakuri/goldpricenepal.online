name: Daily Gold Price Social Post

on:
  schedule:
    # 11:05 AM NPT = 05:20 UTC  (NPT is UTC+5:45)
    - cron: '20 5 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (render only, no post)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: social-automation/package.json

      - name: Install dependencies
        working-directory: social-automation
        run: npm install

      # ── DRY RUN ─────────────────────────────────────────────────────────
      - name: Post daily graphic (dry run)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        working-directory: social-automation
        run: node index.js --dry-run

      - name: Upload preview PNG (dry run only)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: preview-graphic
          path: social-automation/preview-*.png
          retention-days: 3

      # ── LIVE: Step 0 — Validate Facebook token ──────────────────────────
      - name: Validate Facebook token
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
        run: |
          # Strip accidental whitespace/newlines from secrets
          FB_PAGE_ID=$(echo "$FB_PAGE_ID" | tr -d '[:space:]')
          FB_PAGE_ACCESS_TOKEN=$(echo "$FB_PAGE_ACCESS_TOKEN" | tr -d '[:space:]')
          echo "=== Checking FB_PAGE_ID and FB_PAGE_ACCESS_TOKEN are set ==="
          if [ -z "$FB_PAGE_ID" ]; then echo "❌ FB_PAGE_ID secret is EMPTY"; exit 1; fi
          if [ -z "$FB_PAGE_ACCESS_TOKEN" ]; then echo "❌ FB_PAGE_ACCESS_TOKEN secret is EMPTY"; exit 1; fi
          echo "✅ Both secrets are set (PAGE_ID=$FB_PAGE_ID)"
          echo ""
          echo "=== Calling Graph API to validate token ==="
          RESULT=$(curl -s "https://graph.facebook.com/v24.0/${FB_PAGE_ID}?fields=id,name&access_token=${FB_PAGE_ACCESS_TOKEN}")
          echo "$RESULT"
          if echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); exit(0 if 'id' in d else 1)"; then
            echo ""
            echo "✅ Token is VALID — page is accessible"
          else
            echo ""
            echo "❌ Token appears INVALID — see error above"
            exit 1
          fi

      # ── LIVE: Step 1 — Post to Facebook & save preview PNG ──────────────
      - name: Post to Facebook & save preview image
        if: ${{ github.event.inputs.dry_run != 'true' }}
        working-directory: social-automation
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
        run: node index.js --save-preview

      # ── LIVE: Step 2 — Commit preview PNG so Instagram can use the URL ──
      - name: Commit social preview image
        if: ${{ github.event.inputs.dry_run != 'true' }}
        id: commit_preview
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add data/social-preview.png
          if git diff --staged --quiet; then
            echo "Preview unchanged, skipping commit"
          else
            git commit -m "chore: update social preview [skip ci]"
            git pull --rebase --autostash origin main
            git push
          fi
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      # ── LIVE: Step 3 — Post to Instagram ────────────────────────────────
      # Add IG_USER_ID as a GitHub secret to enable Instagram posting.
      # Uses the same FB_PAGE_ACCESS_TOKEN — no separate Instagram token needed.
      # Image served from raw.githubusercontent.com (immediately available after push).
      - name: Post to Instagram
        if: ${{ github.event.inputs.dry_run != 'true' }}
        working-directory: social-automation
        env:
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_IMAGE_URL: "https://raw.githubusercontent.com/SangitThakuri/goldpricenepal.online/${{ steps.commit_preview.outputs.sha }}/data/social-preview.png"
        run: node index.js --instagram-only
