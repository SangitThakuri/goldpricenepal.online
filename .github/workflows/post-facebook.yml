name: Post Daily Gold Price to Facebook

on:
  schedule:
    # 9:15 AM Nepal Time = 3:30 AM UTC
    - cron: '30 3 * * 1-6'
  workflow_dispatch: # allow manual trigger

jobs:
  post-to-facebook:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch gold price and post to Facebook
        run: |
          # Fetch latest rates
          RATES=$(curl -s "https://goldpricenepal.online/data/prices.json" 2>/dev/null || echo "{}")

          GOLD_24K=$(echo "$RATES" | python3 -c "
          import sys, json
          try:
            d = json.load(sys.stdin)
            v = d.get('gold24kTola', 0)
            print('{:,.0f}'.format(v) if v else '')
          except: print('')
          ")

          GOLD_22K=$(echo "$RATES" | python3 -c "
          import sys, json
          try:
            d = json.load(sys.stdin)
            v = d.get('gold24kTola', 0)
            v22 = v * 22 / 24
            print('{:,.0f}'.format(v22) if v else '')
          except: print('')
          ")

          DATE=$(TZ='Asia/Kathmandu' date '+%B %d, %Y')
          DAY=$(TZ='Asia/Kathmandu' date '+%A')

          if [ -z "$GOLD_24K" ]; then
            echo "Could not fetch gold price. Skipping post."
            exit 0
          fi

          MESSAGE="🏅 आजको सुनको भाउ — ${DATE} (${DAY})

🥇 24K Fine Gold:   NPR ${GOLD_24K} / tola
🥈 22K Tejabi Gold: NPR ${GOLD_22K} / tola

📊 Live rates, calculator & price history:
👉 https://goldpricenepal.online

#सुनकोभाउ #GoldPriceNepal #SunKoBhau #NepalGold #FENEGOSIDA"

          RESPONSE=$(curl -s -X POST \
            "https://graph.facebook.com/v19.0/${{ secrets.FB_PAGE_ID }}/feed" \
            --data-urlencode "message=${MESSAGE}" \
            -d "access_token=${{ secrets.FB_PAGE_ACCESS_TOKEN }}")

          echo "Facebook response: $RESPONSE"

          # Check for error
          if echo "$RESPONSE" | grep -q '"error"'; then
            echo "ERROR posting to Facebook!"
            exit 1
          else
            POST_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id','unknown'))")
            echo "Posted successfully! Post ID: $POST_ID"
          fi
