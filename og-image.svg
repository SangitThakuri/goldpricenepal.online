<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0E14"/>
      <stop offset="100%" stop-color="#1A2035"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E4B84D"/>
      <stop offset="100%" stop-color="#C9972E"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1F2940"/>
      <stop offset="100%" stop-color="#161B2D"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(201,151,46,0.04)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#gold)"/>

  <!-- Logo icon -->
  <g transform="translate(80, 70)">
    <rect width="64" height="58" rx="14" fill="#1C1408"/>
    <g transform="translate(10, 9)" fill="none">
      <path d="M1 40L17 8L28 25L37 5L46 40H1Z" fill="rgba(228,184,77,0.3)"/>
      <path d="M17 8L28 25L37 5L45 40H4L17 8Z" fill="rgba(228,184,77,0.6)"/>
      <path d="M28 25L37 5L44 40H20L28 25Z" fill="#E4B84D"/>
    </g>
  </g>

  <!-- Site name -->
  <text x="162" y="96" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="28" font-weight="800" fill="#F5F0E0">Gold Price</text>
  <text x="322" y="96" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="28" font-weight="800" fill="#E4B84D"> Nepal</text>

  <!-- FENEGOSIDA badge -->
  <rect x="162" y="108" width="170" height="26" rx="13" fill="rgba(201,151,46,0.15)" stroke="rgba(201,151,46,0.3)" stroke-width="1"/>
  <circle cx="178" cy="121" r="5" fill="#4ADE80"/>
  <text x="190" y="126" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" font-weight="600" fill="#86EFAC">FENEGOSIDA • LIVE</text>

  <!-- Main headline -->
  <text x="80" y="230" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="60" font-weight="800" fill="#FFFFFF">Today's Gold Price</text>
  <text x="80" y="300" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="60" font-weight="800" fill="url(#gold)">in Nepal</text>

  <!-- Subtitle -->
  <text x="80" y="354" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="22" fill="#9CA3AF">Live 24K · 22K Tejabi · Silver — Per Tola, Gram &amp; Aana</text>

  <!-- Price cards -->
  <!-- 24K card -->
  <rect x="80" y="400" width="300" height="170" rx="16" fill="url(#card1)" stroke="rgba(228,184,77,0.3)" stroke-width="1.5"/>
  <text x="116" y="437" font-family="sans-serif" font-size="13" font-weight="600" fill="#9CA3AF">FINE GOLD (24K)</text>
  <text x="116" y="490" font-family="-apple-system,sans-serif" font-size="36" font-weight="800" fill="#E4B84D">NPR</text>
  <text x="116" y="530" font-family="-apple-system,sans-serif" font-size="26" font-weight="700" fill="#F5F0E0">Per Tola · Live Rate</text>
  <rect x="116" y="545" width="220" height="3" rx="2" fill="rgba(228,184,77,0.3)"/>

  <!-- 22K card -->
  <rect x="412" y="400" width="280" height="170" rx="16" fill="url(#card1)" stroke="rgba(228,184,77,0.15)" stroke-width="1"/>
  <text x="444" y="437" font-family="sans-serif" font-size="13" font-weight="600" fill="#9CA3AF">TEJABI GOLD (22K)</text>
  <text x="444" y="490" font-family="-apple-system,sans-serif" font-size="36" font-weight="800" fill="#E4B84D">22K</text>
  <text x="444" y="530" font-family="-apple-system,sans-serif" font-size="22" font-weight="600" fill="#9CA3AF">Per Tola</text>

  <!-- Silver card -->
  <rect x="724" y="400" width="250" height="170" rx="16" fill="url(#card1)" stroke="rgba(148,163,184,0.2)" stroke-width="1"/>
  <text x="756" y="437" font-family="sans-serif" font-size="13" font-weight="600" fill="#9CA3AF">SILVER (CHANDI)</text>
  <text x="756" y="490" font-family="-apple-system,sans-serif" font-size="36" font-weight="800" fill="#94A3B8">XAG</text>
  <text x="756" y="530" font-family="-apple-system,sans-serif" font-size="22" font-weight="600" fill="#9CA3AF">Per Tola</text>

  <!-- Chart line decoration (right side) -->
  <g opacity="0.18">
    <polyline points="1000,200 1020,180 1040,195 1060,160 1080,150 1100,165 1120,140 1140,130 1160,145 1180,120 1200,125"
      fill="none" stroke="#E4B84D" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <polygon points="1000,200 1020,180 1040,195 1060,160 1080,150 1100,165 1120,140 1140,130 1160,145 1180,120 1200,125 1200,400 1000,400"
      fill="rgba(228,184,77,0.05)"/>
  </g>

  <!-- URL tag -->
  <text x="1120" y="600" font-family="-apple-system,sans-serif" font-size="18" font-weight="600" fill="#4B5563" text-anchor="end">goldpricenepal.online</text>
</svg>
